<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#080808">
<title>Coach Dashboard — FORGE</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

  :root {
    --black: #080808; --deep: #0f0f0f; --surface: #141414; --card: #1a1a1a;
    --border: #242424; --border-light: #333; --text: #e8e2d9; --text-muted: #8c8480;
    --text-dim: #555; --accent: #c9a96e; --accent-dim: #7a5f38;
    --accent-glow: rgba(201,169,110,0.1); --red: #c94040; --green: #5a8a5a;
  }

  html, body {
    background: var(--black);
    color: var(--text);
    font-family: 'DM Mono', monospace;
    min-height: 100%;
    -webkit-font-smoothing: antialiased;
  }

  body::after {
    content: ''; position: fixed; inset: 0; pointer-events: none; z-index: 9998;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.035'/%3E%3C/svg%3E");
  }

  /* ── TOPBAR ── */
  .topbar {
    height: 52px;
    background: var(--black);
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 20px;
    position: sticky;
    top: 0;
    z-index: 10;
  }
  .topbar-logo { font-family: 'Bebas Neue', sans-serif; font-size: 26px; letter-spacing: 5px; color: var(--accent); line-height: 1; text-decoration: none; }
  .back-link { font-size: 11px; letter-spacing: 1px; color: var(--accent); text-decoration: none; }
  .coach-badge { font-size: 8px; letter-spacing: 3px; color: var(--text-dim); text-transform: uppercase; }

  /* ── AUTH GATE ── */
  .auth-gate {
    position: fixed; inset: 0; background: var(--black); z-index: 500;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    padding: 40px 24px;
  }
  .auth-gate-logo { font-family: 'Bebas Neue', sans-serif; font-size: 48px; letter-spacing: 8px; color: var(--accent); margin-bottom: 8px; }
  .auth-gate-sub { font-size: 9px; letter-spacing: 4px; color: var(--text-muted); text-transform: uppercase; margin-bottom: 40px; }
  .auth-gate-form { width: 100%; max-width: 360px; }
  .auth-input {
    width: 100%; background: var(--surface); border: 1px solid var(--border);
    color: var(--text); font-family: 'DM Mono', monospace; font-size: 13px;
    padding: 14px 16px; outline: none; border-radius: 0; margin-bottom: 10px;
    -webkit-appearance: none;
  }
  .auth-input:focus { border-color: var(--accent); }
  .auth-input::placeholder { color: var(--text-dim); font-size: 11px; }
  .auth-btn {
    width: 100%; padding: 16px; background: var(--accent-glow); border: 1px solid var(--accent);
    color: var(--accent); font-family: 'DM Mono', monospace; font-size: 11px;
    letter-spacing: 3px; text-transform: uppercase; cursor: pointer;
  }
  .auth-btn:active { background: rgba(201,169,110,0.2); }
  .auth-error { font-size: 10px; color: var(--red); letter-spacing: 1px; min-height: 16px; text-align: center; margin-top: 8px; }

  /* ── MAIN LAYOUT ── */
  .main { display: none; max-width: 640px; margin: 0 auto; padding-bottom: 60px; }
  .main.visible { display: block; }

  /* ── HERO ── */
  .dash-hero { padding: 28px 20px 20px; border-bottom: 1px solid var(--border); }
  .dash-eyebrow { font-size: 9px; letter-spacing: 4px; color: var(--accent); text-transform: uppercase; margin-bottom: 8px; }
  .dash-title { font-family: 'Bebas Neue', sans-serif; font-size: 38px; letter-spacing: 4px; line-height: 1; margin-bottom: 6px; }
  .dash-sub { font-size: 10px; letter-spacing: 1px; color: var(--text-muted); }

  /* ── STATS ROW ── */
  .stats-row { display: grid; grid-template-columns: repeat(3, 1fr); border-bottom: 1px solid var(--border); }
  .stat-cell { padding: 14px 16px; border-right: 1px solid var(--border); }
  .stat-cell:last-child { border-right: none; }
  .stat-label { font-size: 8px; letter-spacing: 2px; color: var(--text-muted); text-transform: uppercase; margin-bottom: 4px; }
  .stat-value { font-family: 'Bebas Neue', sans-serif; font-size: 24px; letter-spacing: 2px; color: var(--accent); line-height: 1; }

  /* ── SECTION ── */
  .section { border-bottom: 1px solid var(--border); }
  .section-header { padding: 16px 20px 12px; }
  .section-title { font-family: 'Bebas Neue', sans-serif; font-size: 20px; letter-spacing: 3px; margin-bottom: 4px; }
  .section-sub { font-size: 9px; letter-spacing: 2px; color: var(--text-muted); text-transform: uppercase; }

  /* ── ASSIGN FORM ── */
  .assign-form { padding: 0 20px 20px; }
  .field-label { font-size: 9px; letter-spacing: 3px; color: var(--text-muted); text-transform: uppercase; margin-bottom: 8px; display: block; }
  .field-wrap { margin-bottom: 14px; }

  .assign-input, .assign-select, .assign-textarea {
    width: 100%; background: var(--surface); border: 1px solid var(--border);
    color: var(--text); font-family: 'DM Mono', monospace; font-size: 13px;
    padding: 12px 14px; outline: none; border-radius: 0; -webkit-appearance: none;
    transition: border-color 0.15s;
  }
  .assign-input:focus, .assign-select:focus, .assign-textarea:focus { border-color: var(--accent); }
  .assign-input::placeholder { color: var(--text-dim); font-size: 11px; }
  .assign-select { color: var(--text-muted); cursor: pointer; }
  .assign-select option { background: var(--card); color: var(--text); }
  .assign-textarea { resize: none; min-height: 80px; line-height: 1.6; }
  .assign-textarea::placeholder { color: var(--text-dim); font-size: 11px; }

  .assign-btn {
    width: 100%; padding: 14px; background: var(--accent-glow); border: 1px solid var(--accent);
    color: var(--accent); font-family: 'DM Mono', monospace; font-size: 11px;
    letter-spacing: 3px; text-transform: uppercase; cursor: pointer; margin-top: 6px;
  }
  .assign-btn:active { background: rgba(201,169,110,0.2); }
  .assign-btn:disabled { opacity: 0.4; cursor: default; }

  .assign-error { font-size: 10px; color: var(--red); letter-spacing: 1px; min-height: 16px; margin-top: 8px; display: none; }
  .assign-error.visible { display: block; }

  /* ── BLOCK PREVIEW ── */
  .block-preview {
    display: none;
    background: var(--deep);
    border: 1px solid var(--border);
    padding: 12px 14px;
    margin-bottom: 14px;
  }
  .block-preview.visible { display: block; }
  .bp-name { font-family: 'Bebas Neue', sans-serif; font-size: 18px; letter-spacing: 3px; color: var(--text); margin-bottom: 4px; }
  .bp-meta { font-size: 9px; letter-spacing: 1px; color: var(--text-muted); }

  /* ── ASSIGNED LIST ── */
  .assigned-list { padding: 0 20px 8px; }
  .assigned-empty { padding: 24px 0; font-size: 10px; letter-spacing: 2px; color: var(--text-dim); text-transform: uppercase; text-align: center; }

  .assigned-card { border: 1px solid var(--border); background: var(--card); margin-bottom: 10px; }
  .assigned-card-header { padding: 14px 16px; display: flex; align-items: flex-start; justify-content: space-between; gap: 12px; }
  .assigned-card-left { flex: 1; min-width: 0; }
  .assigned-card-name { font-family: 'Bebas Neue', sans-serif; font-size: 18px; letter-spacing: 2px; margin-bottom: 2px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .assigned-card-email { font-size: 10px; letter-spacing: 1px; color: var(--accent); margin-bottom: 4px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .assigned-card-meta { font-size: 9px; letter-spacing: 1px; color: var(--text-muted); }
  .assigned-card-note { font-size: 10px; color: var(--text-dim); letter-spacing: 0.5px; font-style: italic; padding: 0 16px 12px; border-top: 1px solid var(--border); padding-top: 10px; }
  .revoke-btn {
    background: none; border: 1px solid var(--border); color: var(--text-dim);
    font-family: 'DM Mono', monospace; font-size: 9px; letter-spacing: 1px;
    text-transform: uppercase; padding: 5px 10px; cursor: pointer; flex-shrink: 0;
    transition: all 0.15s;
  }
  .revoke-btn:hover { border-color: var(--red); color: var(--red); }

  /* ── STATUS CHIP ── */
  .status-chip {
    display: inline-block;
    font-size: 8px; letter-spacing: 2px; text-transform: uppercase;
    padding: 2px 8px; border: 1px solid;
  }
  .status-chip.pending { border-color: var(--accent-dim); color: var(--accent); }
  .status-chip.accepted { border-color: var(--green); color: var(--green); }

  /* ── TOAST ── */
  .toast {
    position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%) translateY(20px);
    background: var(--card); border: 1px solid var(--border); color: var(--text);
    font-size: 11px; letter-spacing: 2px; padding: 10px 20px; z-index: 9999;
    opacity: 0; transition: all 0.25s; pointer-events: none; white-space: nowrap;
  }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

  /* ── LOADING ── */
  .loading-row { padding: 24px 20px; font-size: 9px; letter-spacing: 3px; color: var(--text-dim); text-transform: uppercase; text-align: center; }

  /* ── SIGNOUT ── */
  .topbar-right { display: flex; align-items: center; gap: 12px; }
  .signout-link { font-size: 9px; letter-spacing: 2px; color: var(--text-dim); text-transform: uppercase; cursor: pointer; background: none; border: none; font-family: 'DM Mono', monospace; }
  .signout-link:hover { color: var(--text-muted); }
</style>
</head>
<body>

<!-- ── AUTH GATE ── -->
<div class="auth-gate" id="auth-gate">
  <div class="auth-gate-logo">FORGE</div>
  <div class="auth-gate-sub">Coach Dashboard</div>
  <div class="auth-gate-form">
    <input class="auth-input" type="email" id="gate-email" placeholder="Coach email address" autocomplete="email">
    <input class="auth-input" type="password" id="gate-pass" placeholder="Password" autocomplete="current-password"
      onkeydown="if(event.key==='Enter')gateLogin()">
    <button class="auth-btn" onclick="gateLogin()">SIGN IN →</button>
    <div class="auth-error" id="gate-error"></div>
  </div>
</div>

<!-- ── TOPBAR ── -->
<div class="topbar">
  <a class="back-link" href="/forge.html">← APP</a>
  <a class="topbar-logo" href="/forge.html">FORGE</a>
  <div class="topbar-right">
    <span class="coach-badge" id="coach-name-badge"></span>
    <button class="signout-link" onclick="coachSignOut()">Sign out</button>
  </div>
</div>

<!-- ── MAIN ── -->
<div class="main" id="main">

  <div class="dash-hero">
    <div class="dash-eyebrow">Personal Training</div>
    <div class="dash-title">COACH<br>DASHBOARD</div>
    <div class="dash-sub" id="dash-coach-email">Loading...</div>
  </div>

  <div class="stats-row" id="dash-stats">
    <div class="stat-cell"><div class="stat-label">Assigned</div><div class="stat-value" id="stat-assigned">—</div></div>
    <div class="stat-cell"><div class="stat-label">Accepted</div><div class="stat-value" id="stat-accepted">—</div></div>
    <div class="stat-cell"><div class="stat-label">Clients</div><div class="stat-value" id="stat-clients">—</div></div>
  </div>

  <!-- ASSIGN BLOCK -->
  <div class="section">
    <div class="section-header">
      <div class="section-title">ASSIGN BLOCK</div>
      <div class="section-sub">Send a training block to a client by email</div>
    </div>
    <div class="assign-form">

      <!-- Client email -->
      <div class="field-wrap">
        <label class="field-label" for="client-email">Client Email</label>
        <input class="assign-input" type="email" id="client-email" placeholder="client@email.com" autocomplete="off">
      </div>

      <!-- Block selector -->
      <div class="field-wrap">
        <label class="field-label" for="block-select">Block</label>
        <select class="assign-select" id="block-select" onchange="onBlockSelect()">
          <option value="" disabled selected>Select a published block...</option>
        </select>
      </div>

      <!-- Block preview -->
      <div class="block-preview" id="block-preview">
        <div class="bp-name" id="bp-name">—</div>
        <div class="bp-meta" id="bp-meta">—</div>
      </div>

      <!-- Coach note -->
      <div class="field-wrap">
        <label class="field-label" for="coach-note">Note to Client <span style="color:var(--text-dim);font-size:8px;letter-spacing:1px;text-transform:none">(optional)</span></label>
        <textarea class="assign-textarea" id="coach-note" placeholder="e.g. Start week 1 on Monday. Focus on technique before loading. Check in after session 1..."></textarea>
      </div>

      <div class="assign-error" id="assign-error"></div>
      <button class="assign-btn" id="assign-btn" onclick="assignBlock()">ASSIGN TO CLIENT →</button>
    </div>
  </div>

  <!-- ASSIGNED BLOCKS -->
  <div class="section">
    <div class="section-header">
      <div class="section-title">ASSIGNED</div>
      <div class="section-sub">All blocks sent to clients</div>
    </div>
    <div class="assigned-list" id="assigned-list">
      <div class="loading-row">Loading...</div>
    </div>
  </div>

</div><!-- /main -->

<div class="toast" id="toast"></div>

<script>
// ── SUPABASE ──────────────────────────────────────────────────────────────
const SUPA_URL = 'https://naxojfchohntrfpunbxg.supabase.co';
const SUPA_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im5heG9qZmNob2hudHJmcHVuYnhnIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM1MTEwMTEsImV4cCI6MjA4OTA4NzAxMX0.LA8RsSCetWR3ShPcXLJp5YetE-aqMoEW64bUqRSmd-Q';
const supa = supabase.createClient(SUPA_URL, SUPA_KEY);

let coachUser = null;
let programmes = [];

// ── AUTH ──────────────────────────────────────────────────────────────────
async function gateLogin() {
  const email = document.getElementById('gate-email').value.trim();
  const pass  = document.getElementById('gate-pass').value;
  const errEl = document.getElementById('gate-error');
  errEl.textContent = '';
  if(!email || !pass) { errEl.textContent = 'Email and password required'; return; }
  errEl.textContent = 'Signing in...';

  const { data, error } = await supa.auth.signInWithPassword({ email, password: pass });
  if(error) { errEl.textContent = error.message; return; }

  // Verify coach/admin tier
  const { data: profile } = await supa.from('profiles').select('tier,name,email').eq('id', data.user.id).single();
  if(!profile || (profile.tier !== 'admin' && profile.tier !== 'coached')) {
    errEl.textContent = 'Access restricted to coaches only.';
    await supa.auth.signOut();
    return;
  }

  coachUser = { ...data.user, tier: profile.tier, name: profile.name || email.split('@')[0] };
  initDashboard();
}

async function checkSession() {
  const { data: { session } } = await supa.auth.getSession();
  if(!session?.user) return;
  const { data: profile } = await supa.from('profiles').select('tier,name,email').eq('id', session.user.id).single();
  if(!profile || (profile.tier !== 'admin' && profile.tier !== 'coached')) return;
  coachUser = { ...session.user, tier: profile.tier, name: profile.name || session.user.email.split('@')[0] };
  initDashboard();
}

async function coachSignOut() {
  await supa.auth.signOut();
  coachUser = null;
  document.getElementById('main').classList.remove('visible');
  document.getElementById('auth-gate').style.display = 'flex';
  document.getElementById('gate-error').textContent = '';
  document.getElementById('gate-email').value = '';
  document.getElementById('gate-pass').value = '';
}

// ── INIT ──────────────────────────────────────────────────────────────────
function initDashboard() {
  document.getElementById('auth-gate').style.display = 'none';
  document.getElementById('main').classList.add('visible');
  document.getElementById('dash-coach-email').textContent = coachUser.email;
  document.getElementById('coach-name-badge').textContent = coachUser.name.toUpperCase();
  loadProgrammes();
  loadAssigned();
}

// ── PROGRAMMES → BLOCK SELECTOR ───────────────────────────────────────────
async function loadProgrammes() {
  const { data, error } = await supa.from('programmes').select('*').order('published_at', { ascending: false });
  if(error || !data?.length) {
    document.getElementById('block-select').innerHTML = '<option value="" disabled selected>No published blocks yet</option>';
    return;
  }
  programmes = data;
  const sel = document.getElementById('block-select');
  sel.innerHTML = '<option value="" disabled selected>Select a published block...</option>';
  data.forEach(p => {
    const opt = document.createElement('option');
    opt.value = p.id;
    opt.textContent = p.title + (p.month ? '  ·  ' + p.month : '');
    sel.appendChild(opt);
  });
}

function onBlockSelect() {
  const id = document.getElementById('block-select').value;
  const prog = programmes.find(p => p.id === id);
  const preview = document.getElementById('block-preview');
  if(!prog) { preview.classList.remove('visible'); return; }
  const days = prog.data?.currentBlock?.days?.length || 0;
  const weeks = prog.data?.currentBlock?.weeks || 4;
  document.getElementById('bp-name').textContent = prog.title;
  document.getElementById('bp-meta').textContent = days + ' days · ' + weeks + ' weeks' + (prog.description ? '  ·  ' + prog.description.slice(0,80) : '');
  preview.classList.add('visible');
}

// ── ASSIGN ────────────────────────────────────────────────────────────────
async function assignBlock() {
  const email    = document.getElementById('client-email').value.trim().toLowerCase();
  const progId   = document.getElementById('block-select').value;
  const note     = document.getElementById('coach-note').value.trim();
  const errEl    = document.getElementById('assign-error');
  errEl.classList.remove('visible');

  if(!email) { errEl.textContent = 'Client email is required.'; errEl.classList.add('visible'); return; }
  if(!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) { errEl.textContent = 'Enter a valid email address.'; errEl.classList.add('visible'); return; }
  if(!progId) { errEl.textContent = 'Select a block to assign.'; errEl.classList.add('visible'); return; }

  const prog = programmes.find(p => p.id === progId);
  if(!prog) { errEl.textContent = 'Block not found.'; errEl.classList.add('visible'); return; }

  const btn = document.getElementById('assign-btn');
  btn.textContent = 'ASSIGNING...'; btn.disabled = true;

  // Check if this block is already assigned to this email and not yet accepted
  const { data: existing } = await supa
    .from('assigned_blocks')
    .select('id')
    .eq('client_email', email)
    .eq('programme_id', progId)
    .eq('status', 'pending')
    .maybeSingle();

  if(existing) {
    errEl.textContent = 'This block is already assigned and pending for this client.';
    errEl.classList.add('visible');
    btn.textContent = 'ASSIGN TO CLIENT →'; btn.disabled = false;
    return;
  }

  const { error } = await supa.from('assigned_blocks').insert({
    coach_id:     coachUser.id,
    coach_email:  coachUser.email,
    client_email: email,
    programme_id: progId,
    block_name:   prog.title,
    block_data:   prog.data,
    note:         note || null,
    status:       'pending',
    assigned_at:  new Date().toISOString()
  });

  btn.textContent = 'ASSIGN TO CLIENT →'; btn.disabled = false;

  if(error) {
    // If table doesn't exist yet, surface the migration hint
    if(error.code === '42P01') {
      errEl.textContent = 'Run the DB migration first — see the SQL file.';
    } else {
      errEl.textContent = 'Failed: ' + error.message;
    }
    errEl.classList.add('visible');
    return;
  }

  // Clear form
  document.getElementById('client-email').value = '';
  document.getElementById('block-select').selectedIndex = 0;
  document.getElementById('coach-note').value = '';
  document.getElementById('block-preview').classList.remove('visible');

  showToast('Block assigned ✦');
  loadAssigned();
}

// ── LOAD ASSIGNED ─────────────────────────────────────────────────────────
async function loadAssigned() {
  const list = document.getElementById('assigned-list');
  const { data, error } = await supa
    .from('assigned_blocks')
    .select('*')
    .eq('coach_id', coachUser.id)
    .order('assigned_at', { ascending: false });

  if(error) {
    if(error.code === '42P01') {
      list.innerHTML = `<div class="assigned-empty">Run the DB migration to create the assigned_blocks table.</div>`;
    } else {
      list.innerHTML = `<div class="assigned-empty">Failed to load: ${error.message}</div>`;
    }
    updateStats([]);
    return;
  }

  updateStats(data || []);

  if(!data?.length) {
    list.innerHTML = `<div class="assigned-empty">No blocks assigned yet</div>`;
    return;
  }

  list.innerHTML = data.map(row => {
    const date = new Date(row.assigned_at).toLocaleDateString('en-GB', { day:'numeric', month:'short', year:'numeric' });
    const statusClass = row.status === 'accepted' ? 'accepted' : 'pending';
    return `
      <div class="assigned-card" id="ac-${row.id}">
        <div class="assigned-card-header">
          <div class="assigned-card-left">
            <div class="assigned-card-name">${row.block_name || '—'}</div>
            <div class="assigned-card-email">${row.client_email}</div>
            <div class="assigned-card-meta">
              Assigned ${date}
              &nbsp;·&nbsp;
              <span class="status-chip ${statusClass}">${row.status}</span>
            </div>
          </div>
          <button class="revoke-btn" onclick="revokeBlock('${row.id}')">Revoke</button>
        </div>
        ${row.note ? `<div class="assigned-card-note">"${row.note}"</div>` : ''}
      </div>`;
  }).join('');
}

function updateStats(rows) {
  const total    = rows.length;
  const accepted = rows.filter(r => r.status === 'accepted').length;
  const clients  = new Set(rows.map(r => r.client_email)).size;
  document.getElementById('stat-assigned').textContent = total;
  document.getElementById('stat-accepted').textContent = accepted;
  document.getElementById('stat-clients').textContent  = clients;
}

// ── REVOKE ────────────────────────────────────────────────────────────────
async function revokeBlock(id) {
  if(!confirm('Revoke this block assignment? The client will no longer see it.')) return;
  const { error } = await supa.from('assigned_blocks').delete().eq('id', id);
  if(error) { showToast('Failed to revoke'); return; }
  document.getElementById('ac-' + id)?.remove();
  showToast('Assignment revoked');
  loadAssigned();
}

// ── TOAST ─────────────────────────────────────────────────────────────────
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2200);
}

// ── BOOT ──────────────────────────────────────────────────────────────────
checkSession();
